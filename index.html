<!DOCTYPE html>
<html lang="pt - br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel e ferramentas</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>
    <header>
        <strong>
            Painel de Ferramentas
        </strong>
    </header>
    <main>
        <div id="lista">
            <li><a id="moedas" href=""><button class="botoeslista">Moedas</button></a></li>
            <li><a id="imc" href=""><button class="botoeslista">IMC</button></a></li>
            <li><a id="temperatura" href=""><button class="botoeslista">Temperatura</button></a></li>
            <li><a id="velocidade" href=""><button class="botoeslista">Velocidade</button></a></li>
            <li><a id="massa" href=""><button class="botoeslista">Massa</button></a></li>
            <li><a id="regra3" href=""><button class="botoeslista">Regra de 3</button></a></li>
        </div>

        <aside>
            <section class="hidden moedas">
                <h2 id="Títulomoeda">Conversor de moeda</h2>

                <input type="number" placeholder="Digite o valor" id="Digitarvalor">

                <select name="" id="moedaOrigem">
                    <option value="dindin">Moeda de origem</option>
                    <option value="USD">USD</option>
                    <option value="BRL">BRL</option>
                </select>
                <h3>para</h3>
                <select name="" id="convMoedas">
                    <option value="dindin">Moeda de conversão</option>
                    <option value="USD">USD</option>
                    <option value="BRL">BRL</option>
                </select>
                <button id="butConverter">Converter</button>
                <p id="resulMoeda"></p>
            </section>


            <section class="hidden imc">
                <h2 class="titulo-secao">Calculadora de IMC</h2>
                <input type="number" placeholder="Peso (kg)" id="imcPeso">
                <input type="number" placeholder="Altura (ex: 1.75)" id="imcAltura">
                <select id="imcGenero">
                    <option value="escolher">Selecione o seu gênero</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                </select>
                <button id="butImc">Calcular</button>
                <p id="resulImc"></p>
            </section>

            <section class="hidden temperatura">
                <h2 class="titulo-secao">Conversor de Temperatura</h2>
                <input type="number" placeholder="Digite o valor" id="tempValor">
                <select id="tempOrigem">
                    <option value="vazio">De:</option>
                    <option value="C">Celsius (°C)</option>
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="K">Kelvin (K)</option>
                </select>
                <h3>para</h3>
                <select id="tempDestino">
                    <option value="vazio">Para:</option>
                    <option value="C">Celsius (°C)</option>
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="K">Kelvin (K)</option>
                </select>
                <button id="butTemp">Converter</button>
                <p id="resulTemp"></p>
            </section>


            <section class="hidden velocidade">
                <h2 class="titulo-secao">Conversor de Velocidade</h2>
                <input type="number" placeholder="Digite o valor" id="velValor">
                <select id="velOrigem">
                    <option value="vazio">De:</option>
                    <option value="kmh">km/h</option>
                    <option value="ms">m/s</option>
                    <option value="mph">mph</option>
                </select>
                <h3>para</h3>
                <select id="velDestino">
                    <option value="vazio">Para:</option>
                    <option value="kmh">km/h</option>
                    <option value="ms">m/s</option>
                    <option value="mph">mph</option>
                </select>
                <button id="butVel">Converter</button>
                <p id="resulVel"></p>
            </section>

            <section class="hidden massa">
                <h2 class="titulo-secao">Conversor de Massa</h2>
                <input type="number" placeholder="Digite o valor" id="massaValor">
                <select id="massaOrigem">
                    <option value="vazio">De:</option>
                    <option value="kg">Quilograma (kg)</option>
                    <option value="g">Grama (g)</option>
                    <option value="lb">Libra (lb)</option>
                    <option value="oz">Onça (oz)</option>
                </select>
                <h3>para</h3>
                <select id="massaDestino">
                    <option value="vazio">Para:</option>
                    <option value="kg">Quilograma (kg)</option>
                    <option value="g">Grama (g)</option>
                    <option value="lb">Libra (lb)</option>
                    <option value="oz">Onça (oz)</option>
                </select>
                <button id="butMassa">Converter</button>
                <p id="resulMassa"></p>
            </section>


            <section class="hidden regra3">
                <h2 class="titulo-secao">Regra de Três</h2>
                <p class="instrucao-regra3">Se <input type="number" id="r3A"> equivale a <input type="number" id="r3B">,
                </p>
                <p class="instrucao-regra3">então <input type="number" id="r3C"> equivale a <span id="r3X">?</span></p>
                <button id="butRegra3">Calcular</button>
                <p id="resulRegra3"></p>
            </section>

        </aside>
    </main>

    <footer><strong>Lorem ipsum dolor sit</strong></footer>
</body>

</html>
</main>

</body>

</html>
